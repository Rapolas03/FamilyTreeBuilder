<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamilyTreeApp</title>
    <link rel="stylesheet" href="./style.css">

</head>

<body>
    <header>
        <h2>Build your own family tree</h2>
    </header>


    <input type="text" id="person-name" placeholder="Enter person's name">

    <button id="add-person-btn">Add Person</button>
    <button id="remove-person-btn">Remove Person</button>

    <div class="canvas" id="canvas">
        <svg id="family-tree" width="100%" height="1000"></svg>
    </div>

    <script src="app.js"></script>

</body>

</html>
